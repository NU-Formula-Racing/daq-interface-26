name: Build releases

# Triggers:
#   - push of a tag like v0.2.0  -> build all platforms and attach to a GitHub Release
#   - manual dispatch from the Actions tab -> build all platforms and upload as artifacts (no release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      # Don't cancel other platforms if one fails. We want partial builds to still upload.
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple silicon runner
            platform: darwin-arm64
            artifact_glob: 'desktop/release/*.dmg'
          - os: ubuntu-latest
            platform: linux-x86_64
            artifact_glob: 'desktop/release/*.AppImage'
          - os: windows-latest
            platform: windows-amd64
            artifact_glob: 'desktop/release/*.zip'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---- Parser binary (PyInstaller) ----
      # PyInstaller can't cross-compile, so each runner builds its own.
      - name: Build parser binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd parser
          python -m venv .venv
          source .venv/bin/activate
          pip install -e .
          pip install pyinstaller
          ./build.sh

      - name: Build parser binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd parser
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          pip install -e .
          pip install pyinstaller
          .\build.ps1

      # ---- Frontend ----
      - name: Build frontend
        shell: bash
        run: |
          cd app
          npm ci
          npm run build

      # ---- Desktop deps ----
      - name: Install desktop deps
        shell: bash
        run: |
          cd desktop
          npm ci

      # ---- Package ----
      # Postgres binaries for all three platforms are vendored under
      # desktop/build/postgres-bin/{macos-arm64,linux-x64,windows-x64}/.
      - name: Package app
        shell: bash
        env:
          DEBUG: electron-builder
        run: |
          cd desktop
          npm run package

      # ---- Upload as workflow artifact (always) ----
      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfrInterface-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

      # ---- Attach to the GitHub Release (only for tag pushes) ----
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          body: |
            ## Install

            ### macOS
            The app is unsigned, so Gatekeeper will block it on first launch
            with "damaged" or "unverified developer." After dragging the app
            to Applications, run this once in Terminal to clear the
            quarantine attribute:

            ```
            xattr -dr com.apple.quarantine "/Applications/nfrInterface.app"
            ```

            Then open the app normally.

            ### Windows
            Right-click the downloaded `.zip` → **Properties** → check
            **Unblock** before extracting (otherwise SmartScreen will block
            `nfrInterface.exe` on launch). Extract the zip and run
            `nfrInterface.exe` from inside.

            ### Linux
            Make the AppImage executable (`chmod +x nfrInterface-*.AppImage`)
            and run it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
